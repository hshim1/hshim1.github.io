  <circle cx="160" cy="160" r="160" fill="url(#bg)" />
  <circle cx="160" cy="160" r="132" fill="none" stroke="#274754" stroke-width="6" opacity="0.35" />
  <text x="160" y="182" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="700" letter-spacing="4" fill="#17323c">HS</text>
