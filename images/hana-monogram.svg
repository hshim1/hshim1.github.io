<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Hana Shim monogram avatar</title>
  <desc id="desc">A circular monogram avatar with the initials HS.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9eef2" />
      <stop offset="100%" stop-color="#7fa7b3" />
